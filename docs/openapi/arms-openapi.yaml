  /api/convoys/{id}/dispatch-ready:
    post:
      tags: [Convoys]
      summary: Dispatch ready subtasks (one wave)
      description: |
        When `task_agent_health` for the parent task is stalled, error, failed, offline, or dead, returns 200 with no new dispatches.
        On gateway failure, increments per-subtask `dispatch_attempts` until the cap (default 5), then responds with 502.
      parameters:
        - $ref: "#/components/parameters/convoyId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Convoy" }
        "502":
          description: Gateway error after retry cap for a subtask
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/costs:
    post:
      tags: [Costs]
      summary: Record cost
      description: |
        Appends a `cost_events` row and emits live activity when configured.
        Enforces the same per-product budget as task dispatch (`cost_caps` + optional default cumulative via `ARMS_BUDGET_DEFAULT_CAP`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordCostRequest" }
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: recorded }
        "402":
          description: Would exceed cost caps or default cumulative budget
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }


              schema: { $ref: "#/components/schemas/Error" }

  /api/tasks/{id}/convoy:
    get:
      tags: [Tasks, Convoys]
      summary: Get convoy by parent task (Mission Control shape)
      description: Same logical convoy as GET /api/convoys/{id}, but keyed by parent task id. Subtasks include nested `task` with synthetic Kanban status mapping.
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissionControlConvoyResponse" }
        "404":
          description: No convoy for this task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [Tasks, Convoys]
      summary: Create convoy under task (Mission Control)
      description: Body accepts MC-style fields; `strategy: ai` returns 501. Stores MC-oriented fields under `metadata_json.mc_compat`.
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MissionControlCreateConvoyRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissionControlConvoyResponse" }
        "409":
          description: Convoy already exists for parent task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [Tasks, Convoys]
      summary: Update convoy status (Mission Control)
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, description: "e.g. active, paused — stored in mc_compat" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissionControlConvoyResponse" }
        "404":
          description: No convoy for this task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Tasks, Convoys]
      summary: Delete convoy for task (Mission Control)
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        "404":
          description: No convoy for this task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }


              schema: { type: object, properties: { status: { type: string, example: resolved } } }
        "503":
          description: Merge queue or ship not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/convoys:
    post:
      tags: [Convoys]
      summary: Create convoy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConvoyRequest" }
      responses:

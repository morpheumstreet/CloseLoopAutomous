    get:
      tags: [Stubs]
      summary: Agents (stub)
      responses:
        "200":
          description: Stub

  /api/openclaw/proxy:
    post:
      tags: [Stubs]
      summary: OpenClaw proxy (not implemented)
      responses:
        "501":
          description: Not implemented


            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Convoy mail store not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [Convoys]
      summary: Append a mail message from a subtask
      parameters:
        - $ref: "#/components/parameters/convoyId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostConvoyMailRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Convoy mail store not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/convoys/{id}/dispatch-ready:
    post:
      tags: [Convoys]
      summary: Dispatch ready subtasks (one wave)
      parameters:
        - $ref: "#/components/parameters/convoyId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Convoy" }

  /api/costs:
    post:
      tags: [Costs]
      summary: Record cost
      description: |
        Appends a `cost_events` row and emits live activity when configured.
        Enforces the same per-product budget as task dispatch (`cost_caps` + optional default cumulative via `ARMS_BUDGET_DEFAULT_CAP`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordCostRequest" }
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: recorded }
        "402":
          description: Would exceed cost caps or default cumulative budget
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }


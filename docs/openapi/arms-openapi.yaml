openapi: 3.1.0
info:
  title: Arms API
  description: |
    HTTP API for the **arms** orchestration service (Mission Control–style parity in progress).

    - Human-oriented reference: [api-ref.md](../api-ref.md)
    - Live route JSON: `GET /api/docs/routes`
    - When `MC_API_TOKEN` is unset, Bearer auth is disabled (development default).

    **Correlation:** responses include `X-Request-ID` (echo client header or server-generated UUID).

    Tags include **Ops** (`GET /api/operations-log`) and **Ideas** (preference-model routes alongside swipes).

    Hand-maintained; update when routes or payloads change.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local default (`ARMS_LISTEN`)

tags:
  - name: Health
  - name: Products
  - name: Ideas
  - name: Tasks
  - name: Convoys
  - name: Costs
  - name: Stubs
  - name: Webhooks
  - name: Live
  - name: Ops
  - name: NLP

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Value must match `MC_API_TOKEN` when set.

  parameters:
    productId:
      name: id
      in: path
      required: true
      schema: { type: string }
    ideaId:
      name: id
      in: path
      required: true
      schema: { type: string }
    taskId:
      name: id
      in: path
      required: true
      schema: { type: string }
    mergeQueueRowId:
      name: id
      in: path
      required: true
      description: Primary key of workspace_merge_queue (from GET /api/products/{id}/merge-queue).
      schema: { type: integer, format: int64 }
    convoyId:
      name: id
      in: path
      required: true
      schema: { type: string }
    productFeedbackId:
      name: id
      in: path
      required: true
      description: Product feedback row id (prefix `fb`, from POST /api/products/{id}/feedback).
      schema: { type: string }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        code: { type: string }

    TfidfTagScore:
      type: object
      properties:
        token: { type: string }
        score: { type: number, format: double }

    TfidfSuggestTagsResponse:
      type: object
      properties:
        tags:
          type: array
          items: { $ref: "#/components/schemas/TfidfTagScore" }
        method:
          type: string
          enum: [tfidf, frequency]
          description: frequency when no usable corpus documents were provided
        corpus_documents: { type: integer }
        product_id: { type: string, description: Present for product-scoped route only }
        idea_id: { type: string, description: Echo when idea_id was sent on product route }

    PreferenceModelResponse:
      type: object
      required: [product_id, model_json, source, updated_at]
      properties:
        product_id: { type: string }
        model_json: { type: string }
        source:
          type: string
          enum: [preference_models, legacy]
        updated_at: { type: string, format: date-time }

    PutPreferenceModelRequest:
      type: object
      required: [model_json]
      properties:
        model_json: { type: string, description: Must be valid JSON when parsed }

    PreferenceModelRecomputeResponse:
      type: object
      properties:
        product_id: { type: string }
        model_json: { type: string }
        source: { type: string, example: preference_models }

    ProductScheduleResponse:
      type: object
      required: [product_id, enabled, spec_json]
      properties:
        product_id: { type: string }
        enabled: { type: boolean }
        spec_json: { type: string }
        cron_expr: { type: string, description: "Standard 5-field cron when using Asynq row scheduling (empty if unset)" }
        delay_seconds: { type: integer, minimum: 0, description: "One-shot delay; cleared after enqueue" }
        asynq_task_id: { type: string, description: "Last enqueued Asynq task id (debugging)" }
        last_enqueued_at: { type: string, format: date-time }
        next_scheduled_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PatchProductScheduleRequest:
      type: object
      description: At least one of enabled, spec_json, cron_expr, or delay_seconds is required.
      properties:
        enabled: { type: boolean }
        spec_json: { type: string }
        cron_expr: { type: string }
        delay_seconds: { type: integer, minimum: 0 }

    ConvoyMailMessage:
      type: object
      properties:
        id: { type: integer, format: int64 }
        convoy_id: { type: string }
        subtask_id: { type: string }
        body: { type: string }
        created_at: { type: string, format: date-time }

    ConvoyMailListResponse:
      type: object
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/ConvoyMailMessage" }

    PostConvoyMailRequest:
      type: object
      required: [subtask_id, body]
      properties:
        subtask_id: { type: string }
        body: { type: string }

    OperationsLogEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        actor: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        detail_json: { type: string }
        product_id: { type: string }

    OperationsLogResponse:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/OperationsLogEntry" }

    MergeQueueResolveRequest:
      type: object
      description: Optional body; default action is retry_merge (re-run forge/local merge).
      properties:
        action:
          type: string
          enum: [retry_merge, skip_ship]

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        stage: { type: string }
        research_summary: { type: string }
        workspace_id: { type: string }
        repo_url: { type: string }
        repo_branch: { type: string }
        description: { type: string }
        program_document: { type: string }
        mission_statement: { type: string, description: Optional team mission (Team page) }
        vision_statement: { type: string, description: Optional team vision (Team page) }
        settings_json: { type: string }
        icon_url: { type: string }
        research_cadence_sec: { type: integer, description: "0 disables scheduled research ticks" }
        ideation_cadence_sec: { type: integer, description: "0 disables scheduled ideation ticks" }
        automation_tier:
          type: string
          enum: [supervised, semi_auto, full_auto]
        auto_dispatch_enabled: { type: boolean, description: "Stored flag; dispatch automation not wired yet" }
        preference_model_json:
          type: string
          description: JSON array of swipe events (stub for preference learning)
        merge_policy_json: { type: string }
        merge_policy:
          type: object
          description: Effective merge policy (automation tier + merge_policy_json)
          properties:
            merge_method: { type: string }
            merge_backend_override: { type: string }
            require_approved_review: { type: boolean }
            require_clean_mergeable: { type: boolean }
        merge_queue_pending:
          type: integer
          format: int64
          description: Present when merge queue is wired
        last_auto_research_at:
          type: string
          format: date-time
          description: Omitted when never run
        last_auto_ideation_at:
          type: string
          format: date-time
          description: Omitted when never run
        updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          description: Present when product is soft-deleted (e.g. GET /api/products?include_deleted=true)

    Idea:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        title: { type: string }
        description: { type: string }
        impact: { type: number }
        feasibility: { type: number }
        impact_score: { type: number }
        feasibility_score: { type: number }
        reasoning: { type: string }
        research_backing: { type: string }
        category:
          type: string
          description: MC category (feature, improvement, ux, performance, …)
        complexity: { type: string, description: S, M, L, or XL }
        estimated_effort_hours: { type: number }
        competitive_analysis: { type: string }
        target_user_segment: { type: string }
        revenue_potential: { type: string }
        technical_approach: { type: string }
        risks: { type: string }
        tags:
          type: array
          items: { type: string }
        source: { type: string, enum: [research, manual, resurfaced, feedback] }
        source_research: { type: string }
        status:
          type: string
          enum: [pending, approved, rejected, maybe, building, built, shipped]
        decided: { type: boolean }
        decision: { type: string, enum: [pass, maybe, yes, now, ""] }
        user_notes: { type: string }
        research_cycle_id: { type: string }
        swiped_at: { type: string, format: date-time }
        task_id: { type: string, description: Linked Kanban task when created }
        resurfaced_from: { type: string }
        resurfaced_reason: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PatchIdeaRequest:
      type: object
      description: At least one property required
      properties:
        title: { type: string }
        description: { type: string }
        reasoning: { type: string }
        category: { type: string }
        research_backing: { type: string }
        impact_score: { type: number }
        feasibility_score: { type: number }
        complexity: { type: string }
        estimated_effort_hours: { type: number }
        competitive_analysis: { type: string }
        target_user_segment: { type: string }
        revenue_potential: { type: string }
        technical_approach: { type: string }
        risks: { type: string }
        tags:
          type: array
          items: { type: string }
        source: { type: string }
        source_research: { type: string }
        user_notes: { type: string }

    Task:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        idea_id: { type: string }
        spec: { type: string }
        status:
          type: string
          description: Kanban column (snake_case)
          enum:
            - planning
            - inbox
            - assigned
            - in_progress
            - testing
            - review
            - done
            - failed
            - convoy_active
        status_reason: { type: string }
        plan_approved: { type: boolean }
        clarifications_json: { type: string }
        checkpoint: { type: string }
        external_ref: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Subtask:
      type: object
      properties:
        id: { type: string }
        agent_role: { type: string }
        depends_on:
          type: array
          items: { type: string }
        dispatched: { type: boolean }
        completed: { type: boolean }
        external_ref: { type: string }
        last_checkpoint: { type: string }
        dispatch_attempts:
          type: integer
          description: Failed gateway dispatch count before successful dispatch (capped; default max 5)

    Convoy:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        parent_id: { type: string }
        metadata_json: { type: string }
        graph:
          type: object
          properties:
            node_count: { type: integer }
            edge_count: { type: integer }
            max_depth: { type: integer }
        edges:
          type: array
          description: Normalized dependency arcs (same semantics as GET …/graph); also persisted in SQLite convoy_edges
          items: { $ref: "#/components/schemas/ConvoyGraphEdge" }
        subtasks:
          type: array
          items: { $ref: "#/components/schemas/Subtask" }
        created_at: { type: string, format: date-time }

    IdeasListResponse:
      type: object
      properties:
        ideas:
          type: array
          items: { $ref: "#/components/schemas/Idea" }

    TasksListResponse:
      type: object
      properties:
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }

    ConvoysListResponse:
      type: object
      properties:
        convoys:
          type: array
          items: { $ref: "#/components/schemas/Convoy" }

    ConvoyGraphEdge:
      type: object
      properties:
        from: { type: string, description: "Dependency (upstream) subtask id" }
        to: { type: string, description: "Dependent subtask id" }

    ConvoyGraphLayer:
      type: object
      properties:
        layer: { type: integer, description: "dag_layer (0 = root)" }
        subtask_ids:
          type: array
          items: { type: string }

    ConvoyGraphResponse:
      type: object
      properties:
        convoy_id: { type: string }
        topological_order:
          type: array
          items: { type: string }
          description: Stable dependency order (dependencies before dependents; lexicographic tie-break)
        edges:
          type: array
          items: { $ref: "#/components/schemas/ConvoyGraphEdge" }
        layers:
          type: array
          items: { $ref: "#/components/schemas/ConvoyGraphLayer" }
        graph:
          type: object
          properties:
            node_count: { type: integer }
            edge_count: { type: integer }
            max_depth: { type: integer }

    MissionControlCreateSubtask:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        suggested_role: { type: string }
        agent_id: { type: string, description: "Mapped to agent_role / metadata hint in arms" }
        depends_on:
          type: array
          items: { type: string }

    MissionControlCreateConvoyRequest:
      type: object
      properties:
        strategy: { type: string, example: "manual", description: "ai returns 501 in arms" }
        name: { type: string }
        decomposition_spec: { type: string }
        subtasks:
          type: array
          items: { $ref: "#/components/schemas/MissionControlCreateSubtask" }

    MissionControlConvoyResponse:
      type: object
      description: GET/POST/PATCH …/tasks/{id}/convoy — MC-oriented fields plus arms extensions (metadata_json, edges, graph)
      additionalProperties: true
      properties:
        id: { type: string }
        parent_task_id: { type: string }
        product_id: { type: string }
        name: { type: string }
        strategy: { type: string }
        decomposition_strategy: { type: string }
        decomposition_spec: { type: string }
        status: { type: string }
        total_subtasks: { type: integer }
        completed_subtasks: { type: integer }
        failed_subtasks: { type: integer }
        subtasks:
          type: array
          items: { type: object, additionalProperties: true }

    MissionControlConvoyProgressResponse:
      type: object
      additionalProperties: true
      properties:
        convoy_id: { type: string }
        status: { type: string }
        total: { type: integer }
        completed: { type: integer }
        failed: { type: integer }
        breakdown:
          type: object
          additionalProperties: { type: integer }
        subtasks:
          type: array
          items: { type: object, additionalProperties: true }

    MissionControlConvoyDispatchResponse:
      type: object
      properties:
        dispatched: { type: integer }
        total: { type: integer }
        results:
          type: array
          items:
            type: object
            properties:
              taskId: { type: string }
              success: { type: boolean }

    CreateProductRequest:
      type: object
      required: [name, workspace_id]
      properties:
        name: { type: string }
        workspace_id: { type: string }
        repo_url: { type: string }
        repo_branch: { type: string }
        description: { type: string }
        program_document: { type: string }
        mission_statement: { type: string }
        vision_statement: { type: string }
        settings_json: { type: string }
        icon_url: { type: string }
        research_cadence_sec: { type: integer }
        ideation_cadence_sec: { type: integer }
        automation_tier:
          type: string
          enum: [supervised, semi_auto, full_auto]
        auto_dispatch_enabled: { type: boolean }

    PatchProductRequest:
      type: object
      description: At least one property required.
      properties:
        name: { type: string }
        repo_url: { type: string }
        repo_branch: { type: string }
        description: { type: string }
        program_document: { type: string }
        mission_statement: { type: string }
        vision_statement: { type: string }
        settings_json: { type: string }
        icon_url: { type: string }
        research_cadence_sec: { type: integer }
        ideation_cadence_sec: { type: integer }
        automation_tier:
          type: string
          enum: [supervised, semi_auto, full_auto]
        auto_dispatch_enabled: { type: boolean }

    SwipeRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [pass, maybe, yes, now]

    CreateTaskRequest:
      type: object
      required: [idea_id, spec]
      properties:
        idea_id: { type: string }
        spec: { type: string }

    PatchTaskRequest:
      type: object
      description: At least one property required.
      properties:
        status: { type: string }
        status_reason: { type: string }
        clarifications_json: { type: string }

    ApprovePlanRequest:
      type: object
      properties:
        spec: { type: string }

    RejectPlanRequest:
      type: object
      properties:
        status_reason: { type: string }

    DispatchRequest:
      type: object
      properties:
        estimated_cost: { type: number }

    CheckpointRequest:
      type: object
      required: [payload]
      properties:
        payload: { type: string }

    CreateConvoyRequest:
      type: object
      required: [parent_task_id, product_id, subtasks]
      properties:
        parent_task_id: { type: string }
        product_id: { type: string }
        subtasks:
          type: array
          items:
            type: object
            required: [agent_role]
            properties:
              id: { type: string }
              agent_role: { type: string }
              depends_on:
                type: array
                items: { type: string }

    RecordCostRequest:
      type: object
      required: [product_id, task_id, amount]
      properties:
        product_id: { type: string }
        task_id: { type: string }
        amount: { type: number, minimum: 0 }
        note: { type: string }

    AgentCompletionRequest:
      type: object
      required: [task_id]
      properties:
        task_id: { type: string }
        convoy_id: { type: string, description: "With subtask_id — complete convoy subtask only" }
        subtask_id: { type: string }
        next_board_status:
          type: string
          enum: [testing, review, done]
          description: "Optional; full_auto/semi_auto only — advance board instead of completing (omit or done = complete task)"
        knowledge_summary:
          type: string
          description: "Optional; when the task completes (done path), stored as auto-ingested product knowledge if ARMS_KNOWLEDGE_AUTO_INGEST is enabled"

    CiCompletionRequest:
      type: object
      required: [task_id, next_board_status]
      properties:
        task_id: { type: string }
        next_board_status:
          type: string
          enum: [testing, review, done, failed]
          description: "CI-driven Kanban target; failed defaults status_reason to CI reported failure if omitted"
        status_reason: { type: string, description: "Optional; used for failed and other SetKanbanStatus moves" }
        knowledge_summary:
          type: string
          description: "Optional; when next_board_status is done, stored as auto-ingested product knowledge if ARMS_KNOWLEDGE_AUTO_INGEST is enabled"

    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }

    VersionResponse:
      type: object
      properties:
        version:
          type: string
          description: Full git describe string (linker -X cmd/arms.Version)
        tag:
          type: string
          description: Nearest tag from describe (or whole version when not N-gHASH form)
        number:
          type: string
          description: Semver core parsed from tag without leading v (e.g. 1.2.3); empty if not parseable
        commits_after_tag:
          type: integer
          description: Commits after tag when describe includes -N-gHASH; 0 on exact tag
        commit:
          type: string
          description: Short git revision from linker -X cmd/arms.Commit
        dirty:
          type: boolean
          description: True when version string ends with -dirty

    OpsSummaryResponse:
      type: object
      properties:
        schema_version_expected:
          type: integer
          description: Embedded SQLite migration ceiling (arms_schema_version target)
        build_version: { type: string }
        build_commit: { type: string }
        products:
          type: object
          properties:
            active: { type: integer, format: int64 }
            deleted: { type: integer, format: int64 }

    RoutesResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            type: object
            properties:
              method: { type: string }
              path: { type: string }
              description: { type: string }

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Liveness
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /api/version:
    get:
      tags: [Health]
      summary: Server build version (tag, semver number, commit)
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionResponse" }

  /api/ops/summary:
    get:
      tags: [Health]
      summary: Operator snapshot (schema version, build, product lifecycle counts)
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsSummaryResponse" }

  /api/docs/routes:
    get:
      tags: [Health]
      summary: Route catalog (JSON)
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoutesResponse" }

  /api/products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - name: include_deleted
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
          description: When set, include soft-deleted products (each has deleted_at)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items: { $ref: "#/components/schemas/Product" }
    post:
      tags: [Products]
      summary: Register product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProductRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get product
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [Products]
      summary: Patch product metadata
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchProductRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "400":
          description: Validation
        "404":
          description: Not found
        "409":
          description: Concurrent modification (updated_at changed since read; code stale_entity)
    delete:
      tags: [Products]
      summary: Soft-delete product
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "204":
          description: No content
        "404":
          description: Not found
        "409":
          description: Already deleted

  /api/products/{id}/restore:
    post:
      tags: [Products]
      summary: Restore soft-deleted product
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404":
          description: Not found
        "409":
          description: Not deleted

  /api/products/{id}/research:
    post:
      tags: [Products]
      summary: Run research
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /api/products/{id}/ideation:
    post:
      tags: [Products]
      summary: Run ideation
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /api/products/{id}/ideas:
    get:
      tags: [Ideas]
      summary: List ideas
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdeasListResponse" }

  /api/nlp/tfidf-suggest-tags:
    post:
      tags: [NLP]
      summary: Stateless TF-IDF tag suggestions (no LLM)
      description: |
        Ranks tokens in `text` using TF-IDF against `corpus` strings. Empty corpus falls back to term frequency in `text`.
        English stopwords are removed; alphanumeric tokens only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                corpus:
                  type: array
                  items: { type: string }
                top_k: { type: integer, default: 12, maximum: 64 }
                min_token_len: { type: integer, default: 2 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TfidfSuggestTagsResponse" }
        "400":
          description: Missing text or invalid JSON
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/products/{id}/nlp/tfidf-suggest-tags:
    post:
      tags: [NLP]
      summary: TF-IDF tag suggestions using sibling ideas as corpus
      description: |
        Builds the corpus from other ideas on the product (title, description, reasoning, tags). With `idea_id`, the target is that idea and it is excluded from the corpus.
        Optional `extra_corpus` strings are appended. Requires `text` or `idea_id`.
      parameters:
        - $ref: "#/components/parameters/productId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string, description: Required unless idea_id is set }
                idea_id: { type: string }
                extra_corpus:
                  type: array
                  items: { type: string }
                top_k: { type: integer, default: 12, maximum: 64 }
                min_token_len: { type: integer, default: 2 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TfidfSuggestTagsResponse" }
        "400":
          description: Bad input (missing text/idea_id, idea on wrong product)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Product or idea not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/products/{id}/maybe-pool:
    get:
      tags: [Ideas]

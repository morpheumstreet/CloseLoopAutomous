      responses:
        "200":
          description: Stub

  /api/settings:
    get:
      tags: [Stubs]
      summary: Settings (stub)
      responses:
        "200":
          description: Stub

  /api/webhooks/agent-completion:
    post:
      tags: [Webhooks]
      summary: Agent completion (HMAC)
      security: []
      description: |
        Body is signed with HMAC-SHA256 using `WEBHOOK_SECRET`.
        Header `X-Arms-Signature` = lowercase hex digest of the **raw** body.
      parameters:
        - name: X-Arms-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentCompletionRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "401":
          description: Invalid HMAC
        "503":
          description: WEBHOOK_SECRET not configured

  /api/live/events:
    get:
      tags: [Live]
      summary: SSE stream
      security: []
      description: |
        `text/event-stream`. No auth when `MC_API_TOKEN` is unset and `ARMS_ACL` is empty.

        When `MC_API_TOKEN` is set: send **`Authorization: Bearer`** with the same value, or **`?token=`** with the same value (native browser `EventSource` only supports the query form).
        When only `ARMS_ACL` is configured: use **`?basic=`** with base64(`user:password`).

        With `DATABASE_PATH`, events are relayed from `event_outbox` after commit; in-memory mode uses the hub directly.

        First payload is a `hello` object; then JSON activity events (e.g. `task_dispatched` after task dispatch) as SSE `data:` lines; comment lines for keep-alive ping.
      parameters:
        - name: token
          in: query
          description: Same value as MC_API_TOKEN when Bearer cannot be sent (e.g. EventSource).
          schema: { type: string }
        - name: basic
          in: query
          description: Base64-encoded user:password when ARMS_ACL is used without MC_API_TOKEN.
          schema: { type: string }
        - name: product_id
          in: query
          description: If set, only stream events whose JSON payload matches this product_id (or omits product_id).
          schema: { type: string }
      responses:
        "200":
          description: Stream
          content:
            text/event-stream:
              schema: { type: string }
